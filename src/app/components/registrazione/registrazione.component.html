<div class="container">
  <mat-stepper orientation="vertical" linear='true' #stepper class="step">
    <mat-step [stepControl]="firstFormGroup">
      <form [formGroup]="firstFormGroup" #formone="ngForm" >
        <ng-template matStepLabel>Fill out your name</ng-template>
        <mat-form-field>
          <mat-label>Name</mat-label>
          <input matInput placeholder="Last name, First name" formControlName="firstCtrl" required>
        </mat-form-field>
        <div>
          <button mat-button matStepperNext>Next</button>
        </div>
      </form>
    </mat-step>
    <mat-step [stepControl]="secondFormGroup">
      <form [formGroup]="secondFormGroup" #formtwo="ngForm" (ngSubmit)="onSubmitUser()">
        <ng-template matStepLabel>Fill out your email</ng-template>
        <mat-form-field>
          <mat-label>Email</mat-label>
          <input matInput formControlName="secondCtrl" placeholder="Ex. mario@gmail.com" required>
          <mat-error *ngIf="secondFormGroup?.get('secondCtrl')?.hasError('notExists')">Il nome utente è già in uso</mat-error>
        </mat-form-field>
        <div>
          <button mat-button matStepperPrevious>Back</button>
          <button mat-button matStepperNext>Next</button>
        </div>
      </form>
    </mat-step>
    <mat-step [stepControl]="thirdFormGroup">
      <form [formGroup]="thirdFormGroup" #formthree="ngForm">
        <ng-template matStepLabel>Fill out your password</ng-template>
        <mat-form-field>
          <mat-label>Password</mat-label>
          <input matInput formControlName="thirdCtrl" placeholder="Password" required>
        </mat-form-field>
        <div>
          <button mat-button matStepperPrevious>Back</button>
          <button mat-button matStepperNext>Next</button>
        </div>
      </form>
    </mat-step>
    <mat-step>
      <form [formGroup]="mainForm" (ngSubmit)="onSubmit()">
      <ng-template matStepLabel>Done</ng-template>
      <p>You are now done.</p>
      <div>
        <button mat-button matStepperPrevious>Back</button>
        <button mat-button (click)="stepper.reset()">Reset</button>
        <button mat-button type="submit">
          submit
        </button>
      </div>
    </form>
    </mat-step>
  </mat-stepper>
  <div class="button-container">
    <button mat-button routerLink="login">non hai un account?, accedi</button>
  </div>
  </div>
